version: "3.9"

services:

  # ── NeuroFlow HMI ────────────────────────────────────────────────────────────
  neuroflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuroflow-hmi
    restart: unless-stopped
    ports:
      - "1880:1880"          # Node-RED editor + /ui dashboard
    volumes:
      - neuroflow_data:/data  # Persist flows, credentials, context
    environment:
      - PORT=1880
      - LOG_LEVEL=info
      - CREDENTIAL_SECRET=${CREDENTIAL_SECRET:-neuroflow-secret-change-me}
    depends_on:
      mosquitto:
        condition: service_healthy
    networks:
      - neuroflow_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1880/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Mosquitto MQTT Broker (optional — used by flows.json MQTT nodes) ─────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: neuroflow-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"           # MQTT
      - "9001:9001"           # WebSocket (optional)
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - neuroflow_net
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "test", "-m", "ping", "-q", "0"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  neuroflow_data:
  mosquitto_data:
  mosquitto_log:

networks:
  neuroflow_net:
    driver: bridge
