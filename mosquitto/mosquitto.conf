# Mosquitto MQTT Broker Configuration for NeuroFlow HMI

listener 1883
protocol mqtt

# WebSocket listener (optional, comment out if not needed)
listener 9001
protocol websockets

# Allow anonymous connections (fine for local dev)
# For production: set allow_anonymous false and configure password_file
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
